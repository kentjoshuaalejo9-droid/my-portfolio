  <script>
    /* ── Particles ── */
    (function () {
      const canvas  = document.getElementById('particles-portfolio');
      const ctx     = canvas.getContext('2d');
      const section = document.getElementById('portfolio');
      let particles = [];
      const COUNT   = 55;

      function resize() {
        canvas.width  = section.offsetWidth;
        canvas.height = section.offsetHeight;
      }

      function randomParticle() {
        return {
          x:     Math.random() * canvas.width,
          y:     Math.random() * canvas.height,
          r:     Math.random() * 2 + 0.5,
          dx:    (Math.random() - 0.5) * 0.4,
          dy:    (Math.random() - 0.5) * 0.4,
          alpha: Math.random() * 0.5 + 0.1
        };
      }

      function init() {
        resize();
        particles = Array.from({ length: COUNT }, randomParticle);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(59, 130, 246, ${p.alpha})`;
          ctx.fill();
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0 || p.x > canvas.width)  p.dx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        });
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(59, 130, 246, ${0.12 * (1 - dist / 120)})`;
              ctx.lineWidth   = 0.6;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', init);
      init();
      draw();
    })();

    function createCarousel(trackId, dotsId, prevId, nextId, data, isCert, autoDelay) {
      const track         = document.getElementById(trackId);
      const dotsContainer = document.getElementById(dotsId);
      let current         = 0;
      let autoTimer       = null;

      function buildCard(item) {
        const tagClass = isCert ? 'card-tag cert-label' : 'card-tag';
        const tagText  = isCert ? 'Certification' : item.title.split(' ')[0];
        const imgHtml  = item.img
          ? `<img src="${item.img}" alt="${item.imgAlt}" style="width:100%;height:100%;object-fit:cover;display:block;">`
          : `<svg viewBox="0 0 48 48" fill="none" width="40" height="40"><rect x="6" y="6" width="36" height="36" rx="4" stroke="#3B82F6" stroke-width="2"/><circle cx="18" cy="18" r="4" stroke="#3B82F6" stroke-width="2"/><path d="M6 32l10-8 8 7 6-5 12 9" stroke="#3B82F6" stroke-width="2" stroke-linejoin="round"/></svg><p>Placeholder</p>`;
        return `
          <div class="project-card${isCert ? ' cert-card' : ''}"
               data-title="${item.title}" data-desc="${item.desc}"
               data-img="${item.img || ''}" data-imgalt="${item.imgAlt}"
               onclick="openLightbox(this)">
            <div class="card-img-placeholder${isCert ? ' cert-placeholder' : ''}">${imgHtml}</div>
            <div class="card-info">
              <h3>${item.title}</h3>
              <p>${item.desc}</p>
              <span class="${tagClass}">${tagText}</span>
            </div>
          </div>`;
      }

      track.innerHTML = data.map(buildCard).join('');
      const cards = track.querySelectorAll('.project-card');
      const total = cards.length;

      dotsContainer.innerHTML = '';
      data.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.classList.add('dot');
        if (i === 0) dot.classList.add('active');
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
      });

      function update() {
        cards.forEach((card, i) => {
          card.classList.remove('center', 'side', 'hidden-card');
          const off = i - current;
          if (off === 0)                card.classList.add('center');
          else if (Math.abs(off) === 1) card.classList.add('side');
          else                          card.classList.add('hidden-card');
        });
        dotsContainer.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
      }

      function goTo(index) { current = (index + total) % total; update(); }
      function startAuto() { stopAuto(); autoTimer = setInterval(() => goTo(current + 1), autoDelay); }
      function stopAuto()  { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }

      document.getElementById(prevId).addEventListener('click', () => { goTo(current - 1); startAuto(); });
      document.getElementById(nextId).addEventListener('click', () => { goTo(current + 1); startAuto(); });

      update();
      startAuto();
      return { reset: () => { current = 0; update(); startAuto(); }, stop: stopAuto };
    }

    function openLightbox(card) {
      const img = card.dataset.img;
      if (!img) return;
      const lbImg = document.getElementById('lightbox-img');
      lbImg.src = img;
      lbImg.alt = card.dataset.imgalt;
      document.getElementById('lightbox-title').textContent = card.dataset.title;
      document.getElementById('lightbox-desc').textContent  = card.dataset.desc;
      lbImg.classList.remove('lb-zoom-active');
      void lbImg.offsetWidth;
      lbImg.classList.add('lb-zoom-active');
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    let activeTab    = 'poster';
    let mainCarousel = createCarousel('carousel-track', 'carousel-dots', 'prev-btn', 'next-btn', tabData[activeTab], false, 3000);
    const certCarousel = createCarousel('cert-carousel-track', 'cert-dots', 'cert-prev-btn', 'cert-next-btn', certData, true, 3500);

    document.querySelectorAll('#main-tabs .tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#main-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        mainCarousel.stop();
        mainCarousel = createCarousel('carousel-track', 'carousel-dots', 'prev-btn', 'next-btn', tabData[activeTab], false, 3000);
      });
    });

    const themeBtn = document.getElementById('theme-btn');
    function applyTheme(mode) {
      if (mode === 'light') { document.body.classList.add('light-mode'); themeBtn.innerHTML = '<span class="icon">🌙</span><span>Dark</span>'; }
      else { document.body.classList.remove('light-mode'); themeBtn.innerHTML = '<span class="icon">☀️</span><span>Light</span>'; }
      localStorage.setItem('theme', mode);
    }
    function toggleTheme() { applyTheme(localStorage.getItem('theme') === 'dark' ? 'light' : 'dark'); }
    applyTheme(localStorage.getItem('theme') || 'dark');

    function toggleMenu() {
      document.getElementById('nav-links').classList.toggle('open');
      document.getElementById('hamburger-btn').classList.toggle('active');
    }
	
	/* ── Navbar scroll effect ── */
	window.addEventListener('scroll', () => {
	  const nav = document.querySelector('nav');
	  if (window.scrollY > 10) {
		nav.style.boxShadow = '0 4px 24px rgba(59,130,246,0.15)';
		nav.style.backdropFilter = 'blur(10px)';
		nav.style.background = 'rgba(17,17,17,0.85)';
	  } else {
		nav.style.boxShadow = '';
		nav.style.backdropFilter = '';
		nav.style.background = '';
	  }
	});
	
	/* ── Page Transition ── */
	document.querySelectorAll('a[href]').forEach(link => {
	  const href = link.getAttribute('href');
	  if (!href || href.startsWith('#') || href.startsWith('mailto') || href.startsWith('http')) return;
	  link.addEventListener('click', e => {
		e.preventDefault();
		document.body.classList.add('page-exit');
		setTimeout(() => { window.location.href = href; }, 380);
	  });
	});
